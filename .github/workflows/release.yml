name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: synapse-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: synapse-linux-aarch64
            linker: gcc-aarch64-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: synapse-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: synapse-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.linker != ''
        run: sudo apt-get install -y ${{ matrix.linker }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Stage artifact
        run: cp target/${{ matrix.target }}/release/synapse ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            synapse-linux-x86_64/synapse-linux-x86_64
            synapse-linux-aarch64/synapse-linux-aarch64
            synapse-macos-x86_64/synapse-macos-x86_64
            synapse-macos-aarch64/synapse-macos-aarch64
